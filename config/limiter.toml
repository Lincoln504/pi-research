# SearXNG Limiter Configuration for pi-search-scrape
# This configuration disables all bot detection and rate limiting for local use

[botdetection]
# The prefix defines number of leading bits in an address that are compared
# to determine whether or not an address is part of a (client) network.
ipv4_prefix = 32
ipv6_prefix = 48

# Trust localhost requests completely (no bot detection for local connections)
trusted_proxies = [
  '127.0.0.0/8',
  '::1',
]

[botdetection.ip_limit]
# Disable rate limiting for link-local addresses (localhost)
filter_link_local = false
# Disable link token method (no captcha required)
link_token = false

[botdetection.ip_lists]
# No IP blocking for local use
block_ip = []

# Allow all localhost requests without restrictions
pass_ip = [
  '127.0.0.0/8',      # IPv4 localhost
  'fe80::/10',         # IPv6 link-local
  '0.0.0.0/0',        # Allow all IPv4 (for local container use)
]

# Allow SearXNG org IPs for checks
pass_searxng_org = true
