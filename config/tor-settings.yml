# SearXNG Settings with Tor Proxy Configuration
# This file is used when Tor is enabled for pi-research
# It includes all default settings plus Tor SOCKS5 proxy configuration

# Tor proxy configuration for outgoing requests
outgoing:
  proxies:
    all://:
      - socks5://127.0.0.1:9050
  using_tor_proxy: true
  extra_proxy_timeout: 10
  # Keep other outgoing settings from defaults
  request_timeout: 10.0
  max_request_timeout: 30.0
  useragent_suffix: ""
  pool_connections: 150
  pool_maxsize: 20
  enable_http2: true
  verify: true
  retries: 2

server:
  port: 8888
  bind_address: "127.0.0.1"
  base_url: false
  limiter: false
  public_instance: false

search:
  formats:
    - html
    - json

general:
  instance_name: "pi-research (Tor)"

ui:
  static_use_hash: true

# Engine configuration - same as default-settings.yml
engines:
  # General web engines (run for all unqualified queries)
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg

  - name: brave
    engine: brave
    shortcut: brv

  - name: bing
    engine: bing
    shortcut: bi

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    weight: 1.5

  # Images (only when category=images is requested)
  - name: duckduckgo images
    engine: duckduckgo_extra
    categories: [images]
    ddg_category: images
    shortcut: ddi

  - name: bing images
    engine: bing_images
    categories: [images]
    shortcut: bii

  # News (only when category=news is requested)
  - name: duckduckgo news
    engine: duckduckgo_extra
    categories: [news]
    ddg_category: news
    shortcut: ddn

  - name: bing news
    engine: bing_news
    categories: [news]
    shortcut: bin

  # Videos (only when category=videos is requested)
  - name: duckduckgo videos
    engine: duckduckgo_extra
    categories: [videos]
    ddg_category: videos
    shortcut: ddv

  - name: bing videos
    engine: bing_videos
    categories: [videos]
    shortcut: biv

  # Technical/IT (only when category=it is requested)
  - name: stackoverflow
    engine: stackoverflow
    categories: [it]
    shortcut: so

  # Science/Academic (only when category=science is requested)
  - name: arxiv
    engine: arxiv
    categories: [science]
    shortcut: arx

# Note: The actual Tor port is determined at runtime from PI_RESEARCH_TOR_SOCKS_PORT
# The value above (9050) is a default that will be overridden
