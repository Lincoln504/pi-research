name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Validate tag matches package version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          if [ "$TAG" != "v$VERSION" ]; then
            echo "❌ Tag $TAG does not match package.json version v$VERSION"
            exit 1
          fi
          echo "✅ Tag $TAG matches package version v$VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Run unit tests
        run: npm run test:unit

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish package to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-npm
    if: success()
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## ${{ github.ref_name }}
            
            Automated release published to npm.
            
            **Package**: [`@lincoln504/pi-research@${{ github.ref_name }}`](https://www.npmjs.com/package/@lincoln504/pi-research)
            
            ### Changes
            See [CHANGELOG.md](./CHANGELOG.md) for details.

      - name: Extract changelog entry
        run: |
          TAG="${{ github.ref_name }}"
          echo "Release $TAG" >> $GITHUB_STEP_SUMMARY
          echo "Published to npm: https://www.npmjs.com/package/@lincoln504/pi-research" >> $GITHUB_STEP_SUMMARY
